<div class="title">&#x26A1; SER LUIS &#x26A1;</div>
<canvas id="c" width="820" height="330"></canvas>
<div class="hint">&#x2191; / ESPACIO &nbsp;&middot;&nbsp; saltar &nbsp;&nbsp;&nbsp; &#x2193; &nbsp;&middot;&nbsp; agacharse</div>

<script>

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
const GY=262,G=0.56,JV=-15,BS=4.6;
const PH_STAND=52,PH_DUCK=26,SIGN_BOTTOM=218;
let state='idle',sc=0,hi=0,spd=BS,fr=0,spwnT=65,spwnI=100;
const pl={x:118,y:GY,vy:0,gr:true,duck:false,ptcl:[],dptcl:[],rot:0};
let obs=[];
const rain=[];
for(let i=0;i<130;i++) rain.push({x:Math.random()*W,y:Math.random()*H,len:9+Math.random()*13,spd:13+Math.random()*9,op:0.15+Math.random()*0.35});
const faceImg=document.getElementById('faceImg');

const keys={};
document.addEventListener('keydown',e=>{
  if(keys[e.code])return;keys[e.code]=true;
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();onAct();}
  if(e.code==='ArrowDown')pl.duck=true;
});
document.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='ArrowDown')pl.duck=false;});
cv.addEventListener('click',onAct);
cv.addEventListener('touchstart',e=>{e.preventDefault();onAct();},{passive:false});

function onAct(){
  if(state==='idle'||state==='dead'){start();return;}
  if(pl.gr&&state==='playing')jump();
}
function start(){
  state='playing';sc=0;spd=BS;fr=0;spwnT=65;spwnI=100;obs=[];
  pl.y=GY;pl.vy=0;pl.gr=true;pl.duck=false;pl.ptcl=[];pl.dptcl=[];pl.rot=0;
}
function jump(){
  pl.vy=JV;pl.gr=false;
  for(let i=0;i<8;i++) pl.ptcl.push({x:pl.x,y:pl.y,vx:(Math.random()-0.5)*5,vy:-2-Math.random()*4,r:2.5+Math.random()*3,life:20,max:20,col:'#00ffea'});
}
function spawnObs(){
  const r=Math.random();
  if(r<0.3)       obs.push({t:'barrel',x:W+50,w:30,h:44});
  else if(r<0.55) obs.push({t:'cone',  x:W+50,w:50,h:38});
  else if(r<0.72) obs.push({t:'wall',  x:W+50,w:18,h:55});
  else            obs.push({t:'sign',  x:W+50,w:72});
}
function pRect(){
  const sz=pl.duck?PH_DUCK:PH_STAND;
  return{x:pl.x-sz/2+5,y:pl.y-sz+6,w:sz-10,h:sz-12};
}
function hits(o){
  const p=pRect();
  if(o.t==='sign') return p.x<o.x+o.w-4&&p.x+p.w>o.x+4&&p.y<SIGN_BOTTOM;
  const oy=GY-o.h;
  return p.x<o.x+o.w-3&&p.x+p.w>o.x+3&&p.y+p.h>oy+5&&p.y<GY;
}
function die(){
  state='dead';hi=Math.max(hi,sc);
  for(let i=0;i<24;i++){
    const a=(i/24)*Math.PI*2,s=3+Math.random()*5;
    pl.dptcl.push({x:pl.x,y:pl.y-PH_STAND/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,r:3+Math.random()*5,life:60,max:60,col:i%2===0?'#ff2dce':'#00ffea'});
  }
}
function update(){
  fr++;
  if(state==='dead'){pl.dptcl=pl.dptcl.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life--;return p.life>0;});return;}
  if(state!=='playing')return;
  sc+=spd*0.05;spd=BS+Math.pow(sc*0.001,1.12);spwnI=Math.max(42,100-sc*0.07);
  if(!pl.gr){pl.vy+=G;pl.y+=pl.vy;if(pl.y>=GY){pl.y=GY;pl.vy=0;pl.gr=true;pl.rot=0;}}
  if(!pl.gr) pl.rot+=0.08; else pl.rot=0;
  rain.forEach(r=>{r.y+=r.spd;r.x-=spd*0.4;if(r.y>H){r.y=-10;r.x=Math.random()*W;}if(r.x<0)r.x=W;});
  if(fr%2===0&&pl.gr) pl.ptcl.push({x:pl.x-26,y:pl.y+(Math.random()-0.5)*4,vx:-1.2-Math.random(),vy:-0.8-Math.random(),r:2+Math.random()*2,life:14,max:14,col:'#ff2dce'});
  pl.ptcl=pl.ptcl.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.r*=0.88;p.life--;return p.life>0;});
  spwnT--;if(spwnT<=0){spawnObs();spwnT=spwnI+Math.random()*28;}
  for(const o of obs){o.x-=spd;if(hits(o)){die();return;}}
  obs=obs.filter(o=>o.x>-150);
}
function drawBg(){
  ctx.fillStyle='#05000f';ctx.fillRect(0,0,W,GY);
  for(let i=0;i<22;i++){
    const bx=((i*159+30-fr*spd*0.06)%(W+160)+W+160)%(W+160)-80;
    const bh=45+(i*41)%85,bw=28+(i*19)%34;
    ctx.fillStyle='#0d0022';ctx.fillRect(bx,GY-bh,bw,bh);
    for(let wy=GY-bh+8;wy<GY-12;wy+=11)
      for(let wx=bx+4;wx<bx+bw-4;wx+=9)
        if((i*3+Math.floor(wx/9)+Math.floor(wy/11))%4!==0){ctx.fillStyle='rgba(255,215,70,0.22)';ctx.fillRect(wx,wy,4,4);}
  }
  for(let i=0;i<14;i++){
    const bx=((i*217+80-fr*spd*0.16)%(W+200)+W+200)%(W+200)-100;
    const bh=68+(i*31)%78,bw=38+(i*13)%32;
    ctx.fillStyle='#160030';ctx.fillRect(bx,GY-bh,bw,bh);
    const nc=i%3===0?'rgba(255,45,206,0.55)':i%3===1?'rgba(0,255,234,0.5)':'rgba(255,230,0,0.45)';
    ctx.fillStyle=nc;ctx.fillRect(bx,GY-bh,bw,3);
    for(let wy=GY-bh+10;wy<GY-14;wy+=14)
      for(let wx=bx+5;wx<bx+bw-5;wx+=12)
        if((i*5+Math.floor(wx/12)+Math.floor(wy/14))%3!==0){ctx.fillStyle='rgba(120,180,255,0.22)';ctx.fillRect(wx,wy,6,6);}
  }
}
function drawRain(){
  ctx.save();
  rain.forEach(r=>{ctx.strokeStyle='rgba(140,190,255,'+r.op+')';ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-3,r.y+r.len);ctx.stroke();});
  ctx.restore();
}
function drawGround(){
  ctx.fillStyle='#0c0020';ctx.fillRect(0,GY,W,H-GY);
  const t=fr*0.015;
  const gl=ctx.createLinearGradient(0,0,W,0);
  gl.addColorStop(0,'rgba(255,45,206,'+(0.3+Math.sin(t)*0.1)+')');
  gl.addColorStop(0.5,'rgba(0,255,234,'+(0.35+Math.sin(t+1.5)*0.1)+')');
  gl.addColorStop(1,'rgba(255,45,206,'+(0.28+Math.sin(t+3)*0.1)+')');
  ctx.strokeStyle=gl;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,GY);ctx.lineTo(W,GY);ctx.stroke();
  const dashOff=(fr*spd)%90;
  ctx.fillStyle='rgba(255,255,255,0.08)';
  for(let i=0;i<11;i++) ctx.fillRect(i*90-dashOff,GY+20,55,3);
  for(let i=0;i<5;i++){
    const px=((i*190-fr*spd*0.9+120)%(W+50)+W+50)%(W+50)-25;
    ctx.fillStyle=i%2===0?'rgba(255,45,206,0.07)':'rgba(0,255,234,0.06)';
    ctx.beginPath();ctx.ellipse(px,GY+12,28,4,0,0,Math.PI*2);ctx.fill();
  }
}
function drawPlayer(){
  if(state==='idle')return;
  const sz=pl.duck?PH_DUCK:PH_STAND;
  const cx=pl.x,cy=pl.y-sz/2;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(pl.rot);
  ctx.shadowBlur=16;ctx.shadowColor='#ff2dce';
  ctx.strokeStyle='#ff2dce';ctx.lineWidth=3;ctx.strokeRect(-sz/2,-sz/2,sz,sz);
  ctx.shadowBlur=0;
  ctx.save();ctx.beginPath();ctx.rect(-sz/2,-sz/2,sz,sz);ctx.clip();
  ctx.drawImage(faceImg,-sz/2,-sz/2,sz,sz);
  ctx.restore();
  ctx.strokeStyle='rgba(0,255,234,0.7)';ctx.lineWidth=2;
  const ac=8;
  [[-sz/2,-sz/2,1,1],[sz/2,-sz/2,-1,1],[sz/2,sz/2,-1,-1],[-sz/2,sz/2,1,-1]].forEach(([x,y,dx,dy])=>{
    ctx.beginPath();ctx.moveTo(x+dx*ac,y);ctx.lineTo(x,y);ctx.lineTo(x,y+dy*ac);ctx.stroke();
  });
  ctx.restore();
  ctx.fillStyle='rgba(255,45,206,0.12)';
  ctx.beginPath();ctx.ellipse(cx,GY+3,sz/2*0.8,4,0,0,Math.PI*2);ctx.fill();
}
function drawObs(){obs.forEach(o=>{if(o.t==='barrel')dBarrel(o);else if(o.t==='cone')dCone(o);else if(o.t==='wall')dWall(o);else dSign(o);});}
function dBarrel(o){
  const x=o.x,y=GY,h=o.h,w=o.w;
  ctx.fillStyle='#1c1c30';ctx.fillRect(x+2,y-h+4,w-4,h-4);
  ctx.strokeStyle='rgba(255,45,206,0.5)';ctx.lineWidth=2;
  [0.25,0.55,0.8].forEach(r=>{ctx.beginPath();ctx.moveTo(x+2,y-h*r);ctx.lineTo(x+w-2,y-h*r);ctx.stroke();});
  ctx.fillStyle='#2a2a48';ctx.fillRect(x,y-h,w,6);
  ctx.fillStyle='rgba(255,220,0,0.9)';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText('!',x+w/2,y-h/2+4);ctx.textAlign='left';
}
function dCone(o){
  const cx=o.x+o.w/2,y=GY,h=o.h,s=o.w/2;
  ctx.fillStyle='#dd5500';ctx.beginPath();ctx.moveTo(cx,y-h);ctx.lineTo(cx-s,y);ctx.lineTo(cx+s,y);ctx.closePath();ctx.fill();
  const sf=0.38;ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.beginPath();ctx.moveTo(cx-s*sf,y-h*sf);ctx.lineTo(cx+s*sf,y-h*sf);ctx.lineTo(cx+s*sf+3,y-h*sf+6);ctx.lineTo(cx-s*sf-3,y-h*sf+6);ctx.closePath();ctx.fill();
}
function dWall(o){
  ctx.fillStyle='#2a2545';ctx.fillRect(o.x,GY-o.h,o.w,o.h);
  ctx.strokeStyle='rgba(255,45,206,0.4)';ctx.lineWidth=1.5;ctx.strokeRect(o.x,GY-o.h,o.w,o.h);
}
function dSign(o){
  const x=o.x,sb=SIGN_BOTTOM,sh=28;
  ctx.strokeStyle='rgba(200,200,220,0.35)';ctx.lineWidth=1.5;ctx.setLineDash([3,4]);
  [x+12,x+o.w-12].forEach(wx=>{ctx.beginPath();ctx.moveTo(wx,0);ctx.lineTo(wx,sb-sh);ctx.stroke();});
  ctx.setLineDash([]);
  ctx.fillStyle='#08001a';ctx.fillRect(x,sb-sh,o.w,sh);
  const p=Math.sin(fr*0.12)*0.4+0.6;
  ctx.strokeStyle='rgba(255,45,206,'+p+')';ctx.lineWidth=2;ctx.strokeRect(x,sb-sh,o.w,sh);
  ctx.strokeStyle='rgba(255,45,206,'+(p*0.3)+')';ctx.lineWidth=6;ctx.strokeRect(x,sb-sh,o.w,sh);
  ctx.fillStyle='rgba(255,80,220,'+p+')';ctx.font='bold 8px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText('DUCK!',x+o.w/2,sb-sh/2+3);ctx.textAlign='left';
}
function drawPtcl(){
  ctx.save();
  [...pl.ptcl,...pl.dptcl].forEach(p=>{ctx.globalAlpha=p.life/p.max;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}
function drawHUD(){
  ctx.textAlign='right';ctx.font='11px "Press Start 2P"';
  if(hi>0){ctx.fillStyle='rgba(0,255,234,0.45)';ctx.fillText('HI '+fmt(hi),W-18,27);}
  ctx.fillStyle='rgba(255,45,206,0.92)';ctx.fillText(fmt(sc),W-18,48);
  ctx.textAlign='left';
  const lvl=Math.min(8,Math.floor((spd-BS)/0.65));
  for(let i=0;i<8;i++){ctx.fillStyle=i<lvl?'rgba('+(i<4?'255,45,206':'0,255,234')+',0.85)':'rgba(80,20,80,0.3)';ctx.fillRect(18+i*14,13,9,9);}
  const ns=obs.find(o=>o.t==='sign'&&o.x<300&&o.x>pl.x);
  if(ns&&!pl.duck){ctx.fillStyle='rgba(255,45,206,'+(0.5+Math.sin(fr*0.35)*0.5)+')';ctx.font='7px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('v DUCK! v',W/2,24);ctx.textAlign='left';}
}
function drawMsg(t1,t2,t3){
  const bw=400,bh=110,bx=W/2-bw/2,by=H/2-bh/2-12;
  ctx.fillStyle='rgba(5,0,15,0.94)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,4);ctx.fill();
  ctx.strokeStyle='rgba(255,45,206,0.55)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#ff2dce';ctx.font='11px "Press Start 2P"';ctx.textAlign='center';ctx.fillText(t1,W/2,by+32);
  ctx.fillStyle='rgba(0,255,234,0.85)';ctx.font='7px "Press Start 2P"';ctx.fillText(t2,W/2,by+56);
  ctx.fillStyle='rgba(255,45,206,0.55)';ctx.fillText(t3,W/2,by+80);
  ctx.textAlign='left';
}
function fmt(n){return Math.floor(n).toString().padStart(5,'0');}
function draw(){
  ctx.clearRect(0,0,W,H);
  drawBg();drawRain();drawGround();drawObs();drawPtcl();drawPlayer();drawHUD();
  if(state==='idle') drawMsg('\u26A1 SER LUIS \u26A1','ESPACIO / CLICK para correr','creado por Alex Blanco');
  else if(state==='dead') drawMsg('\u00D7 GAME OVER \u00D7','ESPACIO / CLICK para reintentar','creado por Alex Blanco');
}
function loop(){update();draw();requestAnimationFrame(loop);}
loop();

</script>
