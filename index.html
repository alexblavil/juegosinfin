<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦕 Dino Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f1a 100%);
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; min-height:100vh;
    font-family:'Press Start 2P', monospace; overflow:hidden;
  }
  #gw { position:relative; width:800px; }
  #topBar {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 14px; background:rgba(0,0,0,0.5);
    border-radius:12px 12px 0 0;
    border:2px solid rgba(255,255,255,0.12); border-bottom:none;
  }
  #avatarCircle {
    width:48px; height:48px; border-radius:50%;
    border:2.5px solid #f0e68c; overflow:hidden;
    box-shadow:0 0 14px rgba(240,230,140,0.5); flex-shrink:0;
  }
  #avatarCircle img { width:100%; height:100%; object-fit:cover; }
  #scoreDisplay { color:#f0e68c; font-size:14px; text-shadow:0 0 10px rgba(240,230,140,0.8); }
  #hiScoreDisplay { color:#90ee90; font-size:10px; }
  #speedDisplay { color:#ff9f43; font-size:10px; transition:color 0.3s; }
  #speedDisplay.boost { color:#ff4444; animation:pulse 0.4s ease; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  #gameCanvas { display:block; border:2px solid rgba(255,255,255,0.12); border-top:none; border-bottom:none; cursor:pointer; }
  #bottomBar {
    background:rgba(0,0,0,0.5); border:2px solid rgba(255,255,255,0.12);
    border-top:none; border-radius:0 0 12px 12px;
    padding:10px 16px; display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .ctrl-hints { display:flex; gap:28px; }
  .ctrl-hint { color:rgba(255,255,255,0.45); font-size:8px; }
  #credit {
    color:#ffffff;
    font-size:22px;
    font-family:'Press Start 2P', monospace;
    letter-spacing:6px;
    text-shadow:
      0 0 18px rgba(255,255,255,0.9),
      0 0 36px rgba(255,255,255,0.5),
      2px 2px 0px rgba(0,0,0,0.8);
  }
  .overlay {
    position:absolute; top:48px; left:0; width:800px; height:302px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.78); backdrop-filter:blur(5px); z-index:10; gap:18px;
  }
  .overlay h1 { color:#f0e68c; font-size:20px; text-shadow:0 0 20px rgba(240,230,140,0.9); letter-spacing:3px; }
  .overlay .sub { color:rgba(255,255,255,0.65); font-size:9px; animation:blink 1.3s infinite; }
  .overlay .info { color:rgba(255,255,255,0.4); font-size:7px; text-align:center; line-height:2; }
  #goTitle { color:#ff6b6b !important; text-shadow:0 0 20px rgba(255,107,107,0.8) !important; }
  #finalScore { color:#f0e68c; font-size:12px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #nightMsg {
    position:absolute; top:55px; left:50%; transform:translateX(-50%);
    color:#a0c4ff; font-size:8px; background:rgba(0,0,0,0.7);
    padding:5px 14px; border-radius:6px; border:1px solid rgba(160,196,255,0.3);
    opacity:0; transition:opacity 0.8s; pointer-events:none; z-index:5; white-space:nowrap;
  }
  #nightMsg.show { opacity:1; }
</style>
</head>

const avatarOff = document.createElement('canvas');
avatarOff.width = avatarOff.height = AV_SIZE;
const avatarOCtx = avatarOff.getContext('2d');

let avatarReady = false;
avatarImg.onload = () => {
  avatarOCtx.clearRect(0,0,AV_SIZE,AV_SIZE);
  avatarOCtx.save();
  avatarOCtx.beginPath();
  avatarOCtx.arc(AV_SIZE/2, AV_SIZE/2, AV_SIZE/2-1, 0, Math.PI*2);
  avatarOCtx.clip();
  avatarOCtx.drawImage(avatarImg, 0, 0, AV_SIZE, AV_SIZE);
  avatarOCtx.restore();
  avatarReady = true;
};

// Helper: dibuja la cara circular escalada en ctx
function drawFace(cx, cy, diameter, borderColor) {
  if(!avatarReady) return;
  const r = diameter/2;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(avatarOff, cx-r, cy-r, diameter, diameter);
  ctx.restore();
  if(borderColor) {
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.stroke();
  }
}

// ── ESTADO ───────────────────────────────────────────────────────────────
let score=0, hiScore=0, speedLevel=1;
let gameRunning=false, gameStarted=false, rafId=0, nightTriggered=false;

const BASE_JUMP = -14;
const BASE_GRAVITY = 0.68;
const DINO_W=54, DINO_H=56;
const dino = { x:80, y:GROUND_Y-DINO_H, w:DINO_W, h:DINO_H, vy:0, onGround:true, frame:0, ft:0 };

let obstacles=[], clouds=[], obsCd=0;
let stars=[];
for(let i=0;i<70;i++) stars.push({x:Math.random()*W, y:Math.random()*(H-90), s:Math.random()<0.25?2:1});

// ── CONTROLES ────────────────────────────────────────────────────────────
function doJump() {
  if(!gameStarted) { startGame(); return; }
  if(!gameRunning) { restartGame(); return; }
  if(dino.onGround) { dino.vy=BASE_JUMP; dino.onGround=false; }
}
document.addEventListener('keydown', e => {
  if(e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); doJump(); }
});
canvas.addEventListener('click', doJump);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); doJump(); }, {passive:false});

// ── INIT ─────────────────────────────────────────────────────────────────
function startGame() {
  gameStarted=true; gameRunning=true;
  document.getElementById('startScreen').style.display='none';
  reset(); rafId=requestAnimationFrame(loop);
}
function restartGame() {
  document.getElementById('goScreen').style.display='none';
  gameRunning=true; reset(); rafId=requestAnimationFrame(loop);
}
function reset() {
  score=0; speedLevel=1; obstacles=[]; obsCd=95; nightTriggered=false;
  dino.y=GROUND_Y-DINO_H; dino.vy=0; dino.onGround=true; dino.frame=0; dino.ft=0;
  clouds=[];
  for(let i=0;i<5;i++) clouds.push(mkCloud(Math.random()*W));
  document.getElementById('nightMsg').classList.remove('show');
  updateHUD();
}

function mkCloud(x) {
  return {x, y:18+Math.random()*75, r:18+Math.random()*28, spd:0.22+Math.random()*0.28};
}

// ── SPAWN OBSTÁCULOS ─────────────────────────────────────────────────────
// Tipos:
//   face_spike  — "cactus" con cara: poste con cabeza encima
//   face_trio   — tres cabezas en fila a distintas alturas
//   face_stack  — dos cabezas apiladas
//   face_float  — cabeza flotante (antes "pájaro"), con orejas/alas decorativas
function spawnObs() {
  const pool = score>220
    ? ['face_spike','face_spike','face_trio','face_stack','face_float']
    : ['face_spike','face_spike','face_trio','face_stack'];
  const t = pool[Math.floor(Math.random()*pool.length)];

  if(t==='face_spike') {
    // Un palo con cabeza arriba — equivalente al cactus pequeño/grande
    const big = Math.random()<0.45;
    const h   = big ? 72 : 52;
    const w   = big ? 42 : 34;
    obstacles.push({x:W+10, y:GROUND_Y-h, w, h, type:'face_spike', big});
  }
  else if(t==='face_trio') {
    // Tres postes juntos, alturas escalonadas
    obstacles.push({x:W+10, y:GROUND_Y-80, w:90, h:80, type:'face_trio'});
  }
  else if(t==='face_stack') {
    // Dos cabezas apiladas en un palo
    obstacles.push({x:W+10, y:GROUND_Y-90, w:38, h:90, type:'face_stack'});
  }
  else if(t==='face_float') {
    // Cabeza flotante a media altura
    const by = GROUND_Y - DINO_H - 10 - Math.random()*30;
    obstacles.push({x:W+10, y:by, w:50, h:50, type:'face_float', bob:0});
  }
}

// ── VELOCIDAD ────────────────────────────────────────────────────────────
function hspd() { return 5 + (speedLevel-1)*1.5; }

// ── COLISIÓN ─────────────────────────────────────────────────────────────
function hits(a,b) {
  const p=10;
  return a.x+p<b.x+b.w-p && a.x+a.w-p>b.x+p && a.y+p<b.y+b.h && a.y+a.h>b.y+p;
}

// ── HUD ──────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreDisplay').textContent='SCORE: '+Math.floor(score);
  document.getElementById('hiScoreDisplay').textContent='HI: '+Math.floor(hiScore);
  document.getElementById('speedDisplay').textContent='SPD ×'+speedLevel;
}

// ── TEMA ─────────────────────────────────────────────────────────────────
function theme() {
  if(score>=500) return {sky:'#0b1220',gnd:'#162033',gndLine:'#1f3050',cloud:'rgba(140,180,255,0.22)',starAlpha:0.85};
  if(score>450) {
    const t=Math.min(1,(score-450)/50);
    const L=(a,b,t)=>Math.round(a+(b-a)*t);
    return {sky:`rgb(${L(168,11,t)},${L(216,18,t)},${L(240,32,t)})`,gnd:'#4e7030',gndLine:'#3d5a24',cloud:'rgba(255,255,255,0.5)',starAlpha:t*0.8};
  }
  return {sky:'#a8d8f0',gnd:'#6da83a',gndLine:'#5a8c2e',cloud:'rgba(255,255,255,0.88)',starAlpha:0};
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update() {
  const v=hspd();
  score+=v*0.09;
  if(score>hiScore) hiScore=score;

  const nl=Math.floor(score/100)+1;
  if(nl!==speedLevel) {
    speedLevel=nl;
    const el=document.getElementById('speedDisplay');
    el.classList.remove('boost'); void el.offsetWidth; el.classList.add('boost');
    setTimeout(()=>el.classList.remove('boost'),450);
  }

  if(!nightTriggered && score>=500) {
    nightTriggered=true;
    const nm=document.getElementById('nightMsg');
    nm.classList.add('show'); setTimeout(()=>nm.classList.remove('show'),2800);
  }

  updateHUD();

  // Física dino
  dino.vy+=BASE_GRAVITY; dino.y+=dino.vy;
  if(dino.y>=GROUND_Y-DINO_H) { dino.y=GROUND_Y-DINO_H; dino.vy=0; dino.onGround=true; }
  if(dino.onGround) { dino.ft++; if(dino.ft>7) { dino.frame=(dino.frame+1)%2; dino.ft=0; } }

  // Nubes
  clouds.forEach(c=>{ c.x-=c.spd; if(c.x+c.r<0) Object.assign(c,mkCloud(W+c.r)); });

  // Spawn
  obsCd-=v*0.4;
  if(obsCd<=0) {
    spawnObs();
    const tFlight=2*Math.abs(BASE_JUMP)/BASE_GRAVITY;
    const minGap=v*tFlight*0.55;
    obsCd=minGap+Math.random()*90;
  }

  // Mover obstáculos
  for(let i=obstacles.length-1;i>=0;i--) {
    const ob=obstacles[i];
    ob.x-=v;
    if(ob.type==='face_float') ob.bob=(ob.bob||0)+0.07;
    if(ob.x+ob.w<0) { obstacles.splice(i,1); continue; }
    if(hits(dino,ob)) { doGameOver(); return; }
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────
function render() {
  const th=theme();
  ctx.fillStyle=th.sky; ctx.fillRect(0,0,W,H);

  if(th.starAlpha>0) {
    ctx.fillStyle=`rgba(255,255,255,${th.starAlpha})`;
    stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s));
  }

  clouds.forEach(c=>{
    ctx.fillStyle=th.cloud;
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.arc(c.x+c.r*.75,c.y-c.r*.3,c.r*.65,0,Math.PI*2);
    ctx.arc(c.x-c.r*.55,c.y-c.r*.2,c.r*.55,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle=th.gnd; ctx.fillRect(0,GROUND_Y+2,W,H-GROUND_Y);
  ctx.fillStyle=th.gndLine; ctx.fillRect(0,GROUND_Y,W,4);
  ctx.fillStyle='rgba(0,0,0,0.10)';
  const off=((performance.now()*hspd()*0.048)%52);
  for(let x=-off;x<W;x+=52) ctx.fillRect(x,GROUND_Y+5,26,2);

  obstacles.forEach(drawObstacle);
  drawDino();
}

// ── DIBUJAR OBSTÁCULOS CON CARA ──────────────────────────────────────────

// Colores del "palo" estilo cactus — distintos para variedad
const POLE_COLORS = ['#8B4513','#6B2FAA','#1a6644','#b03030'];

function drawPole(x, y, w, h, colorIdx) {
  // Palo principal
  const c = POLE_COLORS[colorIdx%POLE_COLORS.length];
  ctx.fillStyle=c;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill();
  // Sombra lateral
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(x+w-5,y+4,5,h-8);
  // Tornillos decorativos
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.arc(x+w/2,y+10,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w/2,y+h-10,3,0,Math.PI*2); ctx.fill();
}

function drawFaceOnPole(cx, cy, faceD, colorIdx) {
  // Plataforma/base donde va la cara
  const bc = POLE_COLORS[colorIdx%POLE_COLORS.length];
  ctx.fillStyle=bc;
  ctx.beginPath(); ctx.roundRect(cx-faceD/2-4, cy-faceD/2-4, faceD+8, faceD+8, faceD/2+4); ctx.fill();
  // Sombra
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.arc(cx, cy+faceD/2+6, faceD/3, 0, Math.PI); ctx.fill();
  // Cara
  drawFace(cx, cy, faceD, '#fff');
  // Expresión: cejas enfadadas
  ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-faceD*.28,cy-faceD*.22); ctx.lineTo(cx-faceD*.10,cy-faceD*.15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+faceD*.28,cy-faceD*.22); ctx.lineTo(cx+faceD*.10,cy-faceD*.15); ctx.stroke();
}

function drawObstacle(ob) {
  const ci = Math.floor(ob.x/17)%POLE_COLORS.length; // color basado en posición inicial

  if(ob.type==='face_spike') {
    const poleW = ob.big ? 14 : 11;
    const faceD = ob.big ? 34 : 26;
    const poleH = ob.h - faceD/2 - 2;
    // Palo
    drawPole(ob.x+ob.w/2-poleW/2, ob.y+faceD*0.6, poleW, poleH, ci);
    // Cara encima
    drawFaceOnPole(ob.x+ob.w/2, ob.y+faceD/2, faceD, ci);
  }

  else if(ob.type==='face_trio') {
    // Tres postes con alturas distintas
    const heights=[55,75,60];
    const xOff=[0,32,62];
    const faceDs=[24,30,24];
    for(let i=0;i<3;i++) {
      const px=ob.x+xOff[i];
      const fD=faceDs[i];
      const poleH=heights[i]-fD*0.6;
      const topY=ob.y+(75-heights[i]);
      drawPole(px+9-5, topY+fD*0.55, 10, poleH, (ci+i)%POLE_COLORS.length);
      drawFaceOnPole(px+9, topY+fD/2, fD, (ci+i)%POLE_COLORS.length);
    }
  }

  else if(ob.type==='face_stack') {
    // Palo largo con dos caras apiladas
    const faceD1=28, faceD2=24;
    const poleW=12;
    drawPole(ob.x+ob.w/2-poleW/2, ob.y+faceD1*0.55, poleW, ob.h-faceD1*0.4, ci);
    // Cara de arriba
    drawFaceOnPole(ob.x+ob.w/2, ob.y+faceD1/2, faceD1, ci);
    // Cara de abajo (a mitad del palo)
    drawFaceOnPole(ob.x+ob.w/2, ob.y+faceD1+faceD2*0.55, faceD2, (ci+1)%POLE_COLORS.length);
  }

  else if(ob.type==='face_float') {
    // Cabeza flotante con alas/brazos temblorosos
    const floatY = ob.y + Math.sin(ob.bob)*5;
    const faceD  = 40;

    // Sombra en el suelo
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.beginPath();
    const shadowDist=GROUND_Y-(floatY+faceD/2+faceD*0.6);
    const shadowR=faceD*0.35*(1-Math.min(1,shadowDist/120));
    ctx.ellipse(ob.x+ob.w/2, GROUND_Y+4, shadowR, shadowR*0.4, 0, 0, Math.PI*2);
    ctx.fill();

    // Alas que baten (arriba/abajo alternadas con sin)
    const wingFlap=Math.sin(ob.bob*2)*12;
    ctx.fillStyle=POLE_COLORS[ci%POLE_COLORS.length];
    // Ala izquierda
    ctx.beginPath();
    ctx.moveTo(ob.x+ob.w/2-faceD*0.45, floatY);
    ctx.quadraticCurveTo(ob.x+ob.w/2-faceD*0.9, floatY-wingFlap, ob.x+ob.w/2-faceD*0.8, floatY+faceD*0.3);
    ctx.closePath(); ctx.fill();
    // Ala derecha
    ctx.beginPath();
    ctx.moveTo(ob.x+ob.w/2+faceD*0.45, floatY);
    ctx.quadraticCurveTo(ob.x+ob.w/2+faceD*0.9, floatY-wingFlap, ob.x+ob.w/2+faceD*0.8, floatY+faceD*0.3);
    ctx.closePath(); ctx.fill();

    // Cara
    drawFaceOnPole(ob.x+ob.w/2, floatY+faceD/2, faceD, ci);

    // Cuernecitos
    ctx.fillStyle=POLE_COLORS[ci%POLE_COLORS.length];
    ctx.beginPath(); ctx.moveTo(ob.x+ob.w/2-10,floatY+2); ctx.lineTo(ob.x+ob.w/2-14,floatY-10); ctx.lineTo(ob.x+ob.w/2-6,floatY); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(ob.x+ob.w/2+10,floatY+2); ctx.lineTo(ob.x+ob.w/2+14,floatY-10); ctx.lineTo(ob.x+ob.w/2+6,floatY); ctx.closePath(); ctx.fill();
  }
}

// ── DIBUJO DINO CON CARA ─────────────────────────────────────────────────
function drawDino() {
  const {x,y}=dino;

  // Cuerpo
  ctx.fillStyle='#4a7a2e';
  ctx.beginPath(); ctx.roundRect(x+8,y+16,32,28,5); ctx.fill();
  // Cabeza
  ctx.beginPath(); ctx.roundRect(x+20,y,28,22,6); ctx.fill();
  // Cola
  ctx.beginPath();
  ctx.moveTo(x+10,y+22); ctx.lineTo(x,y+28); ctx.lineTo(x+4,y+36); ctx.lineTo(x+14,y+30);
  ctx.closePath(); ctx.fill();
  // Borde
  ctx.strokeStyle='#2d5018'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x+20,y,28,22,6); ctx.stroke();

  // Ojo
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(x+40,y+8,5,5,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#2d5018'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(x+40,y+8,5,5,0,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.ellipse(x+41,y+9,3,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(x+42,y+8,1.2,1.2,0,0,Math.PI*2); ctx.fill();

  // Cara en el torso
  drawFace(x+24, y+30, 28, '#2d5018');

  // Patas
  ctx.fillStyle='#4a7a2e';
  if(dino.onGround) {
    if(dino.frame===0) { ctx.fillRect(x+16,y+42,9,12); ctx.fillRect(x+28,y+37,9,12); }
    else               { ctx.fillRect(x+16,y+37,9,12); ctx.fillRect(x+28,y+42,9,12); }
    ctx.fillStyle='#2d5018';
    if(dino.frame===0) { ctx.fillRect(x+15,y+52,10,3); ctx.fillRect(x+27,y+47,10,3); }
    else               { ctx.fillRect(x+15,y+47,10,3); ctx.fillRect(x+27,y+52,10,3); }
  } else {
    ctx.fillRect(x+14,y+40,9,10); ctx.fillRect(x+26,y+40,9,10);
    ctx.fillStyle='#2d5018'; ctx.fillRect(x+13,y+48,10,3); ctx.fillRect(x+25,y+48,10,3);
  }
}

// ── GAME OVER ─────────────────────────────────────────────────────────────
function doGameOver() {
  gameRunning=false; cancelAnimationFrame(rafId); render();
  document.getElementById('finalScore').textContent='SCORE: '+Math.floor(score);
  document.getElementById('goScreen').style.display='flex';
}

// ── LOOP ──────────────────────────────────────────────────────────────────
function loop() {
  if(!gameRunning) return;
  update(); render(); rafId=requestAnimationFrame(loop);
}

// ── PANTALLA INICIAL ──────────────────────────────────────────────────────
(function initRender() {
  ctx.fillStyle='#a8d8f0'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#6da83a'; ctx.fillRect(0,GROUND_Y+2,W,H-GROUND_Y);
  ctx.fillStyle='#5a8c2e'; ctx.fillRect(0,GROUND_Y,W,4);
  [[120,40,25],[320,30,20],[560,50,30]].forEach(([cx,cy,cr])=>{
    ctx.fillStyle='rgba(255,255,255,0.88)';
    ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.arc(cx+cr*.7,cy-cr*.3,cr*.65,0,Math.PI*2); ctx.fill();
  });
  drawDino();
})();
</script>
